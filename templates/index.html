{% extends "base.html" %}

{% block content %}
<main class="min-h-screen flex items-center justify-center p-6 lg:p-12">
    <div class="w-full max-w-7xl grid grid-cols-1 lg:grid-cols-5 gap-12 items-center">
        
        <div class="lg:col-span-3 space-y-10 lg:pr-12 text-center lg:text-left">
            <header class="space-y-4">
                <div class="flex items-center justify-center lg:justify-start gap-2">
                    <div class="bg-action/15 p-2 rounded-xl text-action">
                        <svg class="w-7 h-7" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M13 10V3L4 14h7v7l9-11h-7z" /></svg>
                    </div>
                    <p class="text-sm font-semibold tracking-wider text-action uppercase">AI Career Coach</p>
                </div>
                
                <h1 class="text-5xl lg:text-6xl font-extrabold leading-tight tracking-tighter text-white">
                    Unlock Your Career <span class="text-action">Advantage</span>
                </h1>
                
                <p class="text-xl text-slate-300 max-w-2xl mx-auto lg:mx-0">
                    Submit your resume. Get instant, expert analysis and discover tailored pathways for your professional growth in seconds.
                </p>
            </header>

            <form action="/upload" method="POST" enctype="multipart/form-data" class="glass-panel p-10 rounded-3xl shadow-2xl space-y-8 max-w-xl mx-auto lg:mx-0">
                <div class="space-y-4">
                    <label class="block text-lg font-semibold text-slate-900">
                        Choose Your Resume (PDF)
                    </label>
                    <div class="relative group">
                        <input
                            type="file"
                            name="file"
                            accept=".pdf"
                            required
                            class="block w-full text-sm text-slate-700 bg-white/60 border-2 border-slate-200 rounded-full
                                   cursor-pointer
                                   file:mr-5 file:py-3 file:px-6
                                   file:rounded-full file:border-0
                                   file:text-sm file:font-semibold file:bg-slate-900 file:text-white
                                   hover:file:bg-slate-800
                                   transition duration-150 ease-in-out focus:border-action focus:ring-2 focus:ring-action/20 focus:outline-none"
                        >
                    </div>
                    <p class="text-xs text-slate-500 italic px-4">Maximum file size: 5MB</p>
                </div>

                <button
                    type="submit"
                    class="w-full flex items-center justify-center gap-3 px-8 py-4 border border-transparent
                           text-lg font-semibold rounded-full text-white bg-action
                           hover:bg-blue-700 focus:outline-none focus:ring-4
                           focus:ring-offset-2 focus:ring-action/40 transition duration-150 ease-in-out transform hover:-translate-y-0.5 shadow-lg shadow-action/30"
                >
                    <svg class="w-6 h-6" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 12l2 2 4-4m6 2a9 9 0 11-18 0 9 9 0 0118 0z" /></svg>
                    Analyze My Resume
                </button>
            </form>
        </div>

        <div class="hidden lg:block lg:col-span-2 relative">
            <div class="relative aspect-square flex items-center justify-center">
                <div class="absolute inset-0 bg-gradient-to-br from-action/20 to-brand-deep/0 rounded-full blur-2xl"></div>
                
                <svg viewBox="0 0 24 24" class="w-[100%] h-[100%] text-white floating-icon" fill="none" stroke="currentColor" stroke-width="0.5" style="animation-duration: 7s;">
                    <circle cx="12" cy="12" r="11" fill="#FFFFFF03" stroke="#FFFFFF10"></circle>
                    <path d="M12 4v16M4 12h16" stroke="#2563EB" stroke-width="1"></path>
                    <path d="M8 8l8 8M16 8l-8 8" stroke="#FFFFFF20"></path>
                </svg>
            </div>
        1</div>
    </div>
</main>
{% endblock %}
