{% extends "base.html" %}

{% block content %}
<main class="min-h-screen flex items-center justify-center p-6 lg:p-12">
    <div class="w-full max-w-4xl p-8 lg:p-12 rounded-3xl shadow-2xl space-y-8" 
         style="background: #1e293b !important; color: white !important; border: 1px solid #334155;">
        
        <header class="text-center space-y-2">
            <h1 class="text-3xl lg:text-4xl font-extrabold text-white">
                Resume <span class="text-blue-400">Analysis</span>
            </h1>
            <p class="text-slate-400 font-medium">Expert evaluation of your professional profile</p>
        </header>

        <div style="background: rgba(0,0,0,0.3); padding: 2rem; border-radius: 1rem; border: 1px solid rgba(255,255,255,0.1);">
            <pre class="text-white text-sm md:text-base whitespace-pre-wrap leading-relaxed font-sans">{{ resume_analysis }}</pre>
        </div>

        <div class="flex flex-col sm:flex-row gap-4 justify-between pt-4">
            <a href="/" class="flex items-center justify-center px-8 py-3 rounded-full bg-slate-700 text-white font-bold hover:bg-slate-600 transition duration-200">
                ← Go Back
            </a>
            <a href="/ask" class="flex items-center justify-center px-8 py-3 rounded-full bg-blue-600 text-white font-bold hover:bg-blue-500 transition duration-200">
                Ask a Follow-up Question
            </a>
        </div>
    </div>
</main>
{% endblock %}
