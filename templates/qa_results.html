{% extends "base.html" %}

{% block content %}

<main class="min-h-screen py-10 px-4 lg:px-8">

    <div class="max-w-5xl mx-auto">

        <!-- Heading -->
        <div class="text-center mb-10">
            <h1 class="text-4xl font-extrabold text-white">
                AI Career Coach
            </h1>

            <p class="text-slate-300 mt-3 text-lg">
                Personalized career guidance powered by AI
            </p>
        </div>

        <!-- Question Card -->
        <div class="bg-blue-900/30 border border-blue-400/30 rounded-3xl p-6 mb-8 backdrop-blur-xl shadow-xl">

            <div class="flex items-center gap-3 mb-4">
                <div class="w-3 h-3 rounded-full bg-blue-400"></div>

                <h2 class="text-sm uppercase tracking-widest font-bold text-blue-300">
                    Your Question
                </h2>
            </div>

            <p class="text-white text-lg leading-relaxed font-medium">
                {{ query }}
            </p>
        </div>

        <!-- AI Response -->
        <div class="bg-slate-900/70 border border-white/10 rounded-3xl p-8 backdrop-blur-xl shadow-2xl">

            <div class="flex items-center gap-3 mb-6">
                <div class="w-3 h-3 rounded-full bg-green-400"></div>

                <h2 class="text-sm uppercase tracking-widest font-bold text-green-300">
                    AI Analysis
                </h2>
            </div>

            <div class="prose prose-invert max-w-none text-slate-200 leading-relaxed whitespace-pre-wrap">
                {{ result | safe }}
            </div>

        </div>

        <!-- Buttons -->
        <div class="flex flex-col sm:flex-row justify-center gap-4 mt-10">

            <a href="/ask"
               class="px-8 py-3 rounded-full bg-blue-600 hover:bg-blue-700 text-white font-bold shadow-lg transition duration-200">
                Ask Another Question
            </a>

            <a href="/"
               class="px-8 py-3 rounded-full bg-slate-800 hover:bg-slate-700 text-white font-bold transition duration-200">
                Home
            </a>

        </div>

    </div>

</main>

{% endblock %}
