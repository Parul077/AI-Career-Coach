{% extends "base.html" %}

{% block content %}
<main class="min-h-screen flex items-center justify-center p-6 lg:p-12">
    <div class="w-full max-w-3xl glass-panel p-8 lg:p-10 rounded-3xl shadow-2xl space-y-8 bg-white/10 backdrop-blur-xl border border-white/20">
        <header class="text-center">
            <h1 class="text-3xl font-extrabold text-white drop-shadow-lg">Coach's <span class="text-blue-400">Response</span></h1>
        </header>

        <div class="space-y-6 text-left">
            <div class="bg-blue-900/40 border-l-4 border-blue-400 p-6 rounded-r-2xl">
                <h2 class="text-xs font-black text-blue-300 uppercase tracking-widest mb-2">Your Question</h2>
                <p> class="text-white text-lg font-semibold">{{ query }}</p>
            </div>

            <div class="bg-slate-900/60 p-6 rounded-2xl border border-white/10 shadow-inner">
                <h2 class="text-xs font-black text-slate-400 uppercase tracking-widest mb-3">Analysis</h2>
                <div class="text-slate-100 whitespace-pre-wrap leading-relaxed font-medium">{{ result | safe }}</div>
            </div>
        </div>

        <div class="flex flex-col sm:flex-row gap-4 justify-center pt-4">
            <a href="/ask" class="px-8 py-3 rounded-full bg-blue-600 text-white font-bold hover:bg-blue-700 shadow-lg transition duration-200">
                Ask Another Question
            </a>
            <a href="/" class="px-8 py-3 rounded-full bg-slate-800 text-white font-bold hover:bg-slate-700 transition duration-200">
                Home
            </a>
        </div>
    </div>
</main>
{% endblock %}
