{% extends "base.html" %}

{% block content %}
<main class="min-h-screen flex items-center justify-center p-6 lg:p-12">
    <div class="w-full max-w-3xl glass-panel p-8 lg:p-10 rounded-3xl shadow-2xl space-y-8">
        <header class="text-center">
            <h1 class="text-3xl font-extrabold text-white">Database <span class="text-action">Results</span></h1>
        </header>

        <div class="space-y-6">
            <div class="bg-white/5 border-l-4 border-slate-500 p-6 rounded-r-2xl">
                <h2 class="text-sm font-bold text-slate-400 uppercase tracking-widest mb-2">Query Filter</h2>
                <p class="text-white text-lg">{{ query }}</p>
            </div>

            <div class="bg-white/10 p-6 rounded-2xl border border-white/10">
                <h2 class="text-sm font-bold text-action uppercase tracking-widest mb-3">Retrieved Answer</h2>
                <p class="text-slate-200 whitespace-pre-wrap leading-relaxed">{{ answer }}</p>
            </div>
        </div>

        <div class="flex justify-center pt-4">
            <a href="/query_db" class="px-12 py-4 rounded-full bg-action text-white font-bold hover:bg-blue-700 shadow-lg shadow-action/30 transition duration-200">
                Ask Another Question
            </a>
        </div>
    </div>
</main>
{% endblock %}
