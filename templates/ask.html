{% extends "base.html" %}

{% block content %}
<main class="min-h-screen flex items-center justify-center p-6">
    <div class="w-full max-w-2xl glass-panel p-10 rounded-3xl shadow-2xl text-center space-y-8 bg-white/20 backdrop-blur-md border border-white/30">
        <div class="space-y-4">
            <div class="mx-auto bg-blue-600/20 w-16 h-16 rounded-2xl flex items-center justify-center text-blue-400">
                <svg class="w-8 h-8" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M8 10h.01M12 10h.01M16 10h.01M9 16H5a2 2 0 01-2-2V6a2 2 0 012-2h14a2 2 0 012 2v8a2 2 0 01-2 2h-5l-5 5v-5z"></path>
                </svg>
            </div>
            <h1 class="text-3xl font-bold text-white drop-shadow-md">Ask Your <span class="text-blue-400">Career Coach</span></h1>
            <p class="text-slate-200 font-medium">Inquire about specific roles, skill gaps, or interview tips.</p>
        </div>

        <form action="/ask" method="POST" class="space-y-6">
            <div class="relative group">
                <input type="text" name="query" placeholder="How can I improve my Machine Learning section?" required
                    class="w-full p-5 bg-white/90 border-2 border-white/20 rounded-2xl text-slate-900 placeholder-slate-500 focus:outline-none focus:border-blue-500 focus:ring-4 focus:ring-blue-500/20 transition duration-200"
                >
            </div>
            <button type="submit"
                class="w-full bg-blue-600 text-white font-black py-4 px-6 rounded-2xl hover:bg-blue-700 transition duration-200 transform hover:-translate-y-1 shadow-xl shadow-blue-900/40"
            >
                SUBMIT QUESTION
            </button>
        </form>

        <a href="/" class="inline-block text-slate-200 hover:text-white transition-colors text-sm font-bold underline decoration-blue-400">
            Return to Dashboard
        </a>
    </div>
</main>
{% endblock %}
